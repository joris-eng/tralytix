version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tralytix-postgres
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading -d trading"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    image: migrate/migrate:4
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../apps/api/migrations:/migrations:ro
    command:
      [
        "-path=/migrations",
        "-database=postgres://trading:trading@postgres:5432/trading?sslmode=disable",
        "up",
      ]
    restart: "no"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: tralytix-api
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      DB_DSN: postgres://trading:trading@postgres:5432/trading?sslmode=disable
      MT5_IMPORT_MAX_BYTES: "10485760"
      MT5_IMPORT_MAX_ROWS: "20000"
      HTTP_TIMEOUT_SEC: "15"
      RATE_LIMIT_RPM: "100"
    ports:
      - "8080:8080"

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: tralytix-web
    depends_on:
      api:
        condition: service_started
    environment:
      API_BASE_URL: http://api:8080
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  pgdata:
