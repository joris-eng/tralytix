name: deploy-smoke

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to verify"
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select URLs for target environment
        id: env
        shell: bash
        run: |
          TARGET="${{ github.event.inputs.target }}"
          if [[ -z "${TARGET}" ]]; then
            TARGET="staging"
          fi

          if [[ "${TARGET}" == "production" ]]; then
            echo "web_url=${{ secrets.PRODUCTION_WEB_URL }}" >> "$GITHUB_OUTPUT"
            echo "api_url=${{ secrets.PRODUCTION_API_URL }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "web_url=${{ secrets.STAGING_WEB_URL }}" >> "$GITHUB_OUTPUT"
          echo "api_url=${{ secrets.STAGING_API_URL }}" >> "$GITHUB_OUTPUT"

      - name: Validate smoke URLs format
        shell: bash
        run: |
          WEB_URL="${{ steps.env.outputs.web_url }}"
          API_URL="${{ steps.env.outputs.api_url }}"

          if [[ -z "${WEB_URL}" ]]; then
            echo "Missing web URL secret for selected environment."
            exit 1
          fi
          if [[ -z "${API_URL}" ]]; then
            echo "Missing api URL secret for selected environment."
            exit 1
          fi
          if [[ ! "${WEB_URL}" =~ ^https:// ]]; then
            echo "Web URL must start with https://"
            exit 1
          fi
          if [[ ! "${API_URL}" =~ ^https:// ]]; then
            echo "API URL must start with https://"
            exit 1
          fi
          if [[ "${WEB_URL}" =~ https://https// || "${API_URL}" =~ https://https// ]]; then
            echo "Malformed URL detected (double https)."
            exit 1
          fi

      - name: Run smoke checks
        shell: bash
        run: |
          bash scripts/smoke-deploy.sh "${{ steps.env.outputs.web_url }}" "${{ steps.env.outputs.api_url }}"
