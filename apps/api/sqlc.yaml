version: "2"

sql:
  - engine: postgresql
    schema:
      - sql/schema.sql
    queries:
      - sql/queries
    gen:
      go:
        package: db
        out: internal/platform/db
        sql_package: pgx/v5
        emit_json_tags: true
        emit_interface: false
        emit_empty_slices: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: timestamptz
            go_type:
              import: time
              type: Time