databases:
  - name: tralytix-staging-db
    databaseName: tralytix_staging
    user: tralytix_staging

services:
  - type: web
    name: tralytix-staging-api
    env: go
    rootDir: apps/api
    buildCommand: go build -o bin/api ./cmd/api
    startCommand: ./bin/api
    healthCheckPath: /health
    envVars:
      - key: DB_DSN
        fromDatabase:
          name: tralytix-staging-db
          property: connectionString
      - key: MT5_IMPORT_MAX_BYTES
        value: "10485760"
      - key: MT5_IMPORT_MAX_ROWS
        value: "20000"
      - key: HTTP_TIMEOUT_SEC
        value: "15"
      - key: RATE_LIMIT_RPM
        value: "100"

  - type: web
    name: tralytix-staging-web
    env: node
    rootDir: apps/web
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start -p $PORT
    envVars:
      - key: API_BASE_URL
        fromService:
          type: web
          name: tralytix-staging-api
          property: url
